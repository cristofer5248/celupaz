app = 'celupaz'
primary_region = 'iad'

[build]
  # Al tener un Dockerfile, Fly lo usará automáticamente

[http_service]
  internal_port = 8080  # IMPORTANTE: Cambia de 3000 a 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory_mb = 1024
  cpu_kind = 'shared'
  cpus = 1
