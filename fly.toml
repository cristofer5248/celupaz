app = 'celupaz'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080 # JHipster usa 8080 por defecto
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  SPRING_PROFILES_ACTIVE = "dev" # Aquí forzamos el modo DEV

[[vm]]
  memory_mb = 1024 # Mantener 1GB es buena idea para Java
  cpu_kind = 'shared'
  cpus = 1
[processes]
  app = "java -jar /app/*.jar --spring.profiles.active=dev"
